<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Payment Test</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--tg-theme-bg-color, #fff);
      color: var(--tg-theme-text-color, #000);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    .container {
      width: 100%;
      max-width: 400px;
      text-align: center;
    }
    
    .product-image {
      width: 120px;
      height: 120px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: 20px;
      margin: 0 auto 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 60px;
    }
    
    h1 {
      font-size: 24px;
      margin-bottom: 8px;
      font-weight: 600;
    }
    
    .price {
      font-size: 48px;
      font-weight: 700;
      color: var(--tg-theme-button-color, #2481cc);
      margin: 16px 0;
    }
    
    .description {
      color: var(--tg-theme-hint-color, #999);
      margin-bottom: 32px;
      line-height: 1.5;
    }
    
    .pay-button {
      width: 100%;
      padding: 16px 24px;
      font-size: 17px;
      font-weight: 600;
      color: var(--tg-theme-button-text-color, #fff);
      background: var(--tg-theme-button-color, #2481cc);
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    
    .pay-button:hover {
      opacity: 0.9;
    }
    
    .pay-button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    
    .status {
      margin-top: 20px;
      padding: 12px;
      border-radius: 8px;
      font-size: 14px;
      display: none;
    }
    
    .status.success {
      background: #d4edda;
      color: #155724;
      display: block;
    }
    
    .status.error {
      background: #f8d7da;
      color: #721c24;
      display: block;
    }
    
    .info {
      margin-top: 32px;
      padding: 16px;
      background: var(--tg-theme-secondary-bg-color, #f5f5f5);
      border-radius: 12px;
      font-size: 13px;
      color: var(--tg-theme-hint-color, #666);
      text-align: left;
    }
    
    .info code {
      background: rgba(0,0,0,0.1);
      padding: 2px 6px;
      border-radius: 4px;
      font-family: monospace;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="product-image">🎁</div>
    <h1>Test Product</h1>
    <div class="price">$5.00</div>
    <p class="description">
      This is a test payment. Use card <code>4242 4242 4242 4242</code> to simulate success.
    </p>
    
    <button class="pay-button" id="payBtn" onclick="openPayment()">
      💳 Pay $5.00
    </button>
    
    <div class="status" id="status"></div>
    
    <div class="info">
      <strong>How it works:</strong><br><br>
      1. Click the button<br>
      2. Telegram payment UI opens<br>
      3. Enter test card details<br>
      4. Payment processed instantly<br><br>
      <strong>Test cards:</strong><br>
      Success: <code>4242 4242 4242 4242</code><br>
      Decline: <code>4000 0000 0000 0002</code>
    </div>
  </div>

  <script>
    // Initialize Telegram WebApp
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();
    
    // Set header color to match theme
    tg.setHeaderColor(tg.themeParams.bg_color || '#ffffff');
    
    const payBtn = document.getElementById('payBtn');
    const status = document.getElementById('status');
    
    function openPayment() {
      payBtn.disabled = true;
      payBtn.textContent = 'Opening...';
      
      // Open Telegram payment
      // This opens the native Telegram payment UI
      tg.openInvoice('https://t.me/your_bot?start=payment', (status) => {
        if (status === 'paid') {
          showStatus('✅ Payment successful!', 'success');
          payBtn.textContent = '✓ Paid';
        } else if (status === 'cancelled') {
          showStatus('❌ Payment cancelled', 'error');
          payBtn.disabled = false;
          payBtn.textContent = '💳 Pay $5.00';
        } else {
          showStatus('❌ Payment failed', 'error');
          payBtn.disabled = false;
          payBtn.textContent = '💳 Pay $5.00';
        }
      });
    }
    
    function showStatus(message, type) {
      status.textContent = message;
      status.className = 'status ' + type;
    }
    
    // Alternative: Send invoice via bot API
    // This requires bot integration
    async function requestPayment() {
      // This would be handled by the bot sending an invoice
      tg.sendData(JSON.stringify({ action: 'request_payment', amount: 500 }));
    }
  </script>
</body>
</html>
